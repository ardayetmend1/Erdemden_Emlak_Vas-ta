name: Deploy Backend to Production

on:
  push:
    branches: [master]

env:
  SSH_HOST: 85.159.64.226
  SSH_USER: root
  DEPLOY_PATH: /var/www/erdemden-api-prod
  SERVICE_NAME: erdemden-api-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Release
        run: dotnet publish Erdemden.API/Erdemden.API.csproj -c Release -o ./publish

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Stop service
        timeout-minutes: 5
        run: |
          for attempt in 1 2 3 4 5; do
            echo "=== Stop service attempt $attempt ==="
            if ssh -o ConnectTimeout=30 -o ServerAliveInterval=15 ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "sudo systemctl stop ${{ env.SERVICE_NAME }}"; then
              echo "Service stopped on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 20s..."
            sleep 20
          done
          echo "All stop attempts failed"
          exit 1

      - name: Deploy via rsync
        timeout-minutes: 10
        run: |
          rsync -avz --delete \
            --exclude '.env' \
            --exclude 'appsettings.Production.json' \
            --exclude 'logs/' \
            --exclude 'uploads/' \
            -e "ssh -o ConnectTimeout=30 -o ServerAliveInterval=15" \
            publish/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Start service and health check
        timeout-minutes: 8
        run: |
          sleep 3
          for attempt in 1 2 3 4 5; do
            echo "=== Start service attempt $attempt ==="
            if ssh -o ConnectTimeout=30 -o ServerAliveInterval=15 ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "
              chown -R www-data:www-data ${{ env.DEPLOY_PATH }} &&
              sudo systemctl start ${{ env.SERVICE_NAME }} &&
              sleep 5 &&
              systemctl is-active --quiet ${{ env.SERVICE_NAME }}
            "; then
              echo "Service is running (attempt $attempt)"
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 20s..."
            sleep 20
          done
          echo "All start attempts failed, dumping status:"
          ssh -o ConnectTimeout=30 ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "systemctl status ${{ env.SERVICE_NAME }} --no-pager -l | head -40" || true
          exit 1
